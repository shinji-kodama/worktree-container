# yaml-language-server: $schema=https://aka.ms/winget-manifest.installer.1.9.0.schema.json
# ─────────────────────────────────────────────────────────────────────
# WinGet Installer Manifest for loam
#
# Directory in winget-pkgs:
#   manifests/s/mmr-tortoise/loam/{{VERSION}}/
#
# File name: mmr-tortoise.loam.installer.yaml
#
# Notes:
#   - InstallerType "zip" requires NestedInstallerType and NestedInstallerFiles
#   - NestedInstallerType "portable" makes the exe available directly
#     without a traditional installer (no registry entries, no uninstaller)
#   - PortableCommandAlias creates a command alias so users can run
#     "loam" from the command line after installation
#   - UpgradeBehavior "uninstallPrevious" ensures clean upgrades
#   - GoReleaser produces zip archives for Windows with the naming pattern:
#     loam_{{VERSION}}_windows_amd64.zip
#     loam_{{VERSION}}_windows_arm64.zip
# ─────────────────────────────────────────────────────────────────────
PackageIdentifier: mmr-tortoise.loam
PackageVersion: "{{VERSION}}"
InstallerLocale: en-US
InstallerType: zip
ReleaseDate: "{{RELEASE_DATE}}"
Installers:
  - Architecture: x64
    NestedInstallerType: portable
    NestedInstallerFiles:
      - RelativeFilePath: loam.exe
        PortableCommandAlias: loam
    InstallerUrl: https://github.com/mmr-tortoise/loam/releases/download/v{{VERSION}}/loam_{{VERSION}}_windows_amd64.zip
    InstallerSha256: "{{SHA256_X64}}"
    UpgradeBehavior: uninstallPrevious
  - Architecture: arm64
    NestedInstallerType: portable
    NestedInstallerFiles:
      - RelativeFilePath: loam.exe
        PortableCommandAlias: loam
    InstallerUrl: https://github.com/mmr-tortoise/loam/releases/download/v{{VERSION}}/loam_{{VERSION}}_windows_arm64.zip
    InstallerSha256: "{{SHA256_ARM64}}"
    UpgradeBehavior: uninstallPrevious
ManifestType: installer
ManifestVersion: 1.9.0
